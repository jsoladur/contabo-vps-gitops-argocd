apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app.kubernetes.io/name: openclaw
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: install-gogcli
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              curl -fsSL https://github.com/steipete/gogcli/releases/download/v0.11.0/gogcli_0.11.0_linux_amd64.tar.gz \
                | tar -xz -C /shared-bin gog \
                && chmod +x /shared-bin/gog
          volumeMounts:
            - name: shared-bin
              mountPath: /shared-bin
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.3.11
          # XXX: This docker image has a bug related to "pairing device required"
          # image: ghcr.io/openclaw/openclaw:2026.3.13-1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18789
              name: http
          env:
            - name: PATH
              value: "/shared-bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: google.gemini.api.key
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: google.gemini.api.key
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: gateway.token
            - name: OPENCLAW_HOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: hooks.token
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: telegram.bot.token
            - name: WHATSAPP_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: whatsapp.phone.number
          volumeMounts:
            # openclaw.json config (read-only from ConfigMap)
            - name: config
              mountPath: /home/node/.openclaw/openclaw.json
              subPath: openclaw.json
            # Persistent state (memory, sessions, etc.)
            - name: state
              mountPath: /home/node/.openclaw
            # Bootstrap identity/context files
            - name: bootstrap
              mountPath: /home/node/.openclaw/AGENTS.md
              subPath: AGENTS.md
            - name: bootstrap
              mountPath: /home/node/.openclaw/SOUL.md
              subPath: SOUL.md
            - name: bootstrap
              mountPath: /home/node/.openclaw/USER.md
              subPath: USER.md
            - name: bootstrap
              mountPath: /home/node/.openclaw/IDENTITY.md
              subPath: IDENTITY.md
            - name: bootstrap
              mountPath: /home/node/.openclaw/SKILL.md
              subPath: SKILL.md
            - name: shared-bin
              mountPath: /shared-bin
            # Writable temp dir
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              memory: "4Gi"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 90
            periodSeconds: 30      # was 15
            failureThreshold: 3    # 3 × 30s = 90s tolerance
          readinessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 10      # was 5 — less hammering
            failureThreshold: 3    # 3 × 10s = 30s before marked unready
      volumes:
        - name: config
          configMap:
            name: openclaw-config
        - name: bootstrap
          configMap:
            name: openclaw-bootstrap
        - name: state
          persistentVolumeClaim:
            claimName: openclaw-pvc
        - name: shared-bin
          emptyDir: {}
        - name: tmp
          emptyDir: {}
