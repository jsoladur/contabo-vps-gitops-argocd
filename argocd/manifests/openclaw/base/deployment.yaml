apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app.kubernetes.io/name: openclaw
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
      - name: install-gogcli
        image: busybox:1.36.1
        command:
          - sh
          - -c
          - |
            wget -qO- https://github.com/steipete/gogcli/releases/download/v0.11.0/gogcli_0.11.0_linux_amd64.tar.gz \
              | tar -xz -C /shared-bin gog \
              && chmod +x /shared-bin/gog
        volumeMounts:
          - name: shared-bin
            mountPath: /shared-bin
      - name: setup-gog-credentials
        image: busybox:1.36.1
        command:
          - sh
          - -c
          - |
            mkdir -p /home/node/.openclaw/.config/gogcli
            # Restore pre-authorized keyring (refresh token lives here)
            tar -xzf /secrets/gog.keyring.tar.gz \
              -C /home/node/.openclaw/.config/gogcli/
            # Register OAuth client credentials for token refresh
            /shared-bin/gog auth credentials /secrets/google_client_secret.json
        env:
          - name: XDG_CONFIG_HOME
            value: "/home/node/.openclaw/.config"
          - name: HOME
            value: "/home/node"
          - name: GOG_KEYRING_BACKEND
            value: "file"
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        volumeMounts:
          - name: shared-bin
            mountPath: /shared-bin
          - name: state
            mountPath: /home/node/.openclaw
          - name: google-credentials
            mountPath: /secrets
            readOnly: true
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.3.28
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18789
              name: http
          env:
            - name: PATH
              value: "/shared-bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: google.gemini.api.key
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: google.gemini.api.key
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: openrouter.api.key
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: gateway.token
            - name: OPENCLAW_HOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: hooks.token
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: telegram.bot.token
            - name: WHATSAPP_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: whatsapp.phone.number
            - name: XDG_CONFIG_HOME
              value: "/home/node/.openclaw/.config"
            - name: GOG_ACCOUNT
              value: "josemaria.sola.duran@gmail.com"
            - name: GOG_KEYRING_BACKEND
              value: "file"
            - name: GOG_KEYRING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: gog.keyring.password
          volumeMounts:
            # openclaw.json config (read-only from ConfigMap)
            - name: config
              mountPath: /home/node/.openclaw/openclaw.json
              subPath: openclaw.json
            # Persistent state (memory, sessions, etc.)
            - name: state
              mountPath: /home/node/.openclaw
            # Bootstrap identity/context files
            - name: bootstrap
              mountPath: /home/node/.openclaw/AGENTS.md
              subPath: AGENTS.md
            - name: bootstrap
              mountPath: /home/node/.openclaw/SOUL.md
              subPath: SOUL.md
            - name: bootstrap
              mountPath: /home/node/.openclaw/USER.md
              subPath: USER.md
            - name: bootstrap
              mountPath: /home/node/.openclaw/IDENTITY.md
              subPath: IDENTITY.md
            - name: bootstrap
              mountPath: /home/node/.openclaw/SKILL.md
              subPath: SKILL.md
            - name: shared-bin
              mountPath: /shared-bin
            # Writable temp dir
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              memory: "4Gi"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 90
            periodSeconds: 30      # was 15
            failureThreshold: 3    # 3 × 30s = 90s tolerance
          readinessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 10      # was 5 — less hammering
            failureThreshold: 3    # 3 × 10s = 30s before marked unready
      volumes:
        - name: config
          configMap:
            name: openclaw-config
        - name: bootstrap
          configMap:
            name: openclaw-bootstrap
        - name: state
          persistentVolumeClaim:
            claimName: openclaw-pvc
        - name: google-credentials
          secret:
            secretName: openclaw
            items:
              - key: google_client_secret.json
                path: google_client_secret.json
              - key: gog.keyring.tar.gz
                path: gog.keyring.tar.gz
            defaultMode: 0400
        - name: shared-bin
          emptyDir: {}
        - name: tmp
          emptyDir: {}