apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw
  namespace: openclaw
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`openclaw.vps.jmsola.dev`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: openclaw
          port: 80
          passHostHeader: true
  tls:
    secretName: openclaw-vps-jmsola-dev-cert-secret
